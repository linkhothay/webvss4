<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng CellphoneS - All in One</title>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            text-decoration: none;
            color: #d70018;
            font-weight: bold;
        }

        .cart-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .cart-items {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product-item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            position: relative;
        }

        .product-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .product-info {
            flex: 1;
            padding-left: 15px;
        }

        .product-name {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
            color: #333;
        }

        .product-price {
            color: #d70018;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .quantity-box {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            width: fit-content;
            border-radius: 4px;
        }

        .quantity-box button {
            padding: 5px 12px;
            background: #f8f8f8;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .quantity-box input {
            width: 40px;
            text-align: center;
            border: none;
            outline: none;
            background: transparent;
        }

        .btn-delete {
            position: absolute;
            top: 15px;
            right: 0;
            cursor: pointer;
            color: #999;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-delete:hover {
            color: #d70018;
        }

        .summary-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 20px;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .total {
            font-weight: bold;
            font-size: 1.2rem;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .red-text { color: #d70018; }

        .btn-order {
            width: 100%;
            background: #d70018;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .btn-add-more {
            width: 100%;
            background: white;
            color: #d70018;
            border: 1px solid #d70018;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .cart-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="#" class="back-btn">← Tiếp tục mua sắm</a>
            <h1>Giỏ hàng của bạn</h1>
        </header>

        <main class="cart-wrapper">
            <section class="cart-items" id="cart-list"></section>

            <aside class="cart-summary">
                <div class="summary-box">
                    <div class="summary-line">
                        <span>Tổng tiền tạm tính:</span>
                        <span id="subtotal">0đ</span>
                    </div>
                    <div class="summary-line total">
                        <span>Tổng tiền:</span>
                        <span id="final-total" class="red-text">0đ</span>
                    </div>
                    <button class="btn-order" onclick="checkout()">TIẾN HÀNH ĐẶT HÀNG</button>
                    <button class="btn-add-more">CHỌN THÊM SẢN PHẨM KHÁC</button>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // Lấy dữ liệu từ LocalStorage hoặc dùng mặc định
        let cart = JSON.parse(localStorage.getItem('myCart')) || [
            { 
                id: 1, 
                name: "iPhone 15 Pro Max 256GB Chính hãng VN/A", 
                price: 29590000, 
                qty: 1, 
                img: "https://cdn2.cellphones.com.vn/insecure/rs:fill:358:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/i/p/iphone-15-pro-max_3.png" 
            },
            { 
                id: 2, 
                name: "Củ sạc Apple USB-C 20W Chính hãng", 
                price: 520000, 
                qty: 1, 
                img: "https://cdn2.cellphones.com.vn/insecure/rs:fill:358:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/m/h/mjt23_fe_1.png" 
            }
        ];

        const cartList = document.getElementById('cart-list');
        const subtotalEl = document.getElementById('subtotal');
        const finalTotalEl = document.getElementById('final-total');

        // Định dạng tiền tệ Việt Nam
        function formatCurrency(number) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(number);
        }

        // Vẽ giao diện giỏ hàng
        function renderCart() {
            if (cart.length === 0) {
                cartList.innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <p>Giỏ hàng của bạn đang trống</p>
                        <br>
                        <a href="#" style="color:#d70018">Quay lại trang chủ</a>
                    </div>`;
                updateTotals();
                return;
            }

            cartList.innerHTML = cart.map((item, index) => `
                <div class="product-item">
                    <img src="${item.img}" class="product-img" alt="${item.name}">
                    <div class="product-info">
                        <p class="product-name">${item.name}</p>
                        <p class="product-price">${formatCurrency(item.price)}</p>
                        <div class="quantity-box">
                            <button onclick="changeQty(${index}, -1)">-</button>
                            <input type="text" value="${item.qty}" readonly>
                            <button onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>
                    <div class="btn-delete" onclick="removeItem(${index})">🗑 Xóa</div>
                </div>
            `).join('');

            updateTotals();
            saveToStorage();
        }

        // Tăng/giảm số lượng
        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty < 1) cart[index].qty = 1;
            renderCart();
        }

        // Xóa sản phẩm khỏi giỏ
        function removeItem(index) {
            if (confirm("Xóa sản phẩm này khỏi giỏ hàng?")) {
                cart.splice(index, 1);
                renderCart();
            }
        }

        // Tính toán tổng tiền
        function updateTotals() {
            let total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            subtotalEl.innerText = formatCurrency(total);
            finalTotalEl.innerText = formatCurrency(total);
        }

        // Lưu vào bộ nhớ trình duyệt
        function saveToStorage() {
            localStorage.setItem('myCart', JSON.stringify(cart));
        }

        // Thông báo khi đặt hàng
        function checkout() {
            if(cart.length === 0) {
                alert("Giỏ hàng trống, hãy chọn sản phẩm trước!");
            } else {
                alert("Đơn hàng của bạn đã được ghi nhận thành công!");
                cart = []; // Xóa giỏ hàng sau khi đặt
                renderCart();
            }
        }

        // Chạy ứng dụng
        renderCart();
    </script>
</body>
</html>
